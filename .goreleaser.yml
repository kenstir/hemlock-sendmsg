version: 2

env:
  - GO111MODULE=on

before:
  hooks:
    - go mod download

builds:
  - main: ./...
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64

archives:
  - files:
      - README.md

release:
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
